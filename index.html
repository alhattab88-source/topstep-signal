<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topstep AI Signal</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --accent: #00C896; --bg: #0B0F1A; --card: #111827;
  --border: #1E2A3A; --text: #F0F4FF; --muted: #8A9BB0;
  --red: #FF4D6A; --yellow: #FFB800; --purple: #A78BFA;
}
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Arial, sans-serif; min-height: 100vh; }

.header {
  background: linear-gradient(135deg,#0B0F1A,#0F1E2E);
  border-bottom: 1px solid var(--border);
  padding: 18px 28px;
  display: flex; align-items: center; gap: 14px;
}
.logo {
  background: linear-gradient(135deg,var(--accent),#0099FF);
  border-radius: 12px; width: 48px; height: 48px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 900; color: #000; flex-shrink: 0;
}
.header-title { font-size: 20px; font-weight: 900; }
.header-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }

.wrap { max-width: 700px; margin: 0 auto; padding: 28px 20px; }

.input-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 18px; padding: 26px; margin-bottom: 20px;
}
.input-card h2 { font-size: 16px; font-weight: 800; margin-bottom: 20px; }

.field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.field-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 14px; }
@media(max-width:550px) { .field-grid,.field-grid-3 { grid-template-columns:1fr; } }

.field label { font-size: 11px; color: var(--muted); font-weight: 700; display: block; margin-bottom: 6px; letter-spacing: 0.3px; }
.field input, .field select {
  background: #151E2E; border: 1.5px solid var(--border);
  border-radius: 10px; padding: 10px 14px; color: var(--text);
  font-size: 14px; width: 100%; outline: none; font-family: inherit;
  transition: border-color 0.15s;
}
.field input:focus, .field select:focus { border-color: var(--accent); }

.divider { display: flex; align-items: center; gap: 10px; margin: 18px 0; }
.divider span { font-size: 11px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border); }

.analyze-btn {
  width: 100%; padding: 16px;
  background: linear-gradient(135deg, var(--accent), #0099FF);
  border: none; border-radius: 12px;
  font-size: 16px; font-weight: 900; color: #000;
  cursor: pointer; font-family: inherit;
  transition: opacity 0.15s, transform 0.1s;
}
.analyze-btn:hover { opacity: 0.9; transform: translateY(-1px); }
.analyze-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

.loading {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 18px; padding: 50px 20px;
  text-align: center; margin-bottom: 20px;
}
.pulse { font-size: 44px; animation: pulse 1.2s ease-in-out infinite; display: inline-block; }
@keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.15);opacity:0.7} }
.loading-text { font-size: 15px; color: var(--muted); margin-top: 16px; }
.loading-sub { font-size: 12px; color: var(--border); margin-top: 6px; }

.error-box {
  background: #FF4D6A15; border: 1.5px solid #FF4D6A50;
  border-radius: 14px; padding: 16px 20px;
  color: var(--red); font-size: 13px; margin-bottom: 20px;
}

.result-card {
  background: var(--card); border-radius: 18px;
  overflow: hidden; margin-bottom: 20px;
}
.decision-header { padding: 28px 26px; text-align: center; }
.decision-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; margin-bottom: 8px; }
.decision-main { font-size: 48px; font-weight: 900; letter-spacing: -2px; margin-bottom: 6px; }
.decision-reason { font-size: 14px; line-height: 1.6; opacity: 0.9; }

.metrics-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; border-top: 1px solid var(--border); }
@media(max-width:500px) { .metrics-row { grid-template-columns:1fr 1fr; } }
.metric-item { padding: 16px 14px; text-align: center; border-left: 1px solid var(--border); }
.metric-item:last-child { border-left: none; }
.metric-val { font-size: 20px; font-weight: 900; }
.metric-lbl { font-size: 10px; color: var(--muted); margin-top: 4px; font-weight: 600; }

.trade-box { margin: 0 20px 20px; background: #151E2E; border-radius: 14px; overflow: hidden; }
.trade-box-header { padding: 12px 18px; font-size: 13px; font-weight: 800; border-bottom: 1px solid var(--border); }
.trade-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 18px; border-bottom: 1px solid #1E2A3A30; }
.trade-row:last-child { border-bottom: none; }
.trade-row-label { font-size: 12px; color: var(--muted); font-weight: 600; }
.trade-row-val { font-size: 14px; font-weight: 800; }

.analysis-section { padding: 0 20px 20px; }
.analysis-title { font-size: 12px; font-weight: 800; color: var(--muted); margin-bottom: 12px; letter-spacing: 0.5px; }
.point { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px; font-size: 13px; line-height: 1.55; }
.point-icon { width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; flex-shrink: 0; margin-top: 1px; }

.psych-note { margin: 0 20px 20px; background: #A78BFA0F; border: 1px solid #A78BFA30; border-radius: 14px; padding: 16px 18px; }
.psych-note-title { font-size: 12px; font-weight: 800; color: var(--purple); margin-bottom: 8px; }
.psych-note-text { font-size: 13px; color: var(--muted); line-height: 1.65; }

.disclaimer { background: #151E2E; border-radius: 10px; padding: 10px 16px; font-size: 11px; color: var(--muted); text-align: center; margin-bottom: 20px; }
.reset-btn { background: var(--card); color: var(--accent); border: 1.5px solid var(--accent); border-radius: 12px; padding: 12px 30px; font-size: 14px; font-weight: 800; cursor: pointer; font-family: inherit; display: block; margin: 0 auto 20px; }
.hidden { display: none !important; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🤖</div>
  <div>
    <div class="header-title">Topstep AI Signal</div>
    <div class="header-sub">أدخل بيانات السوق — Claude يقرر الصفقة كاملة</div>
  </div>
</div>

<div class="wrap">
  <div class="input-card">
    <h2>📊 بيانات السوق</h2>

    <div class="field-grid">
      <div class="field">
        <label>الأداة</label>
        <select id="instrument">
          <option value="MNQ">MNQ — Micro Nasdaq</option>
          <option value="MES">MES — Micro S&P 500</option>
          <option value="MGC">MGC — Micro Gold</option>
        </select>
      </div>
      <div class="field">
        <label>الجلسة الحالية</label>
        <select id="session">
          <option>نيويورك (9:30–16:00)</option>
          <option>لندن (3:00–9:00)</option>
          <option>آسيا (18:00–2:00)</option>
          <option>ما قبل الافتتاح</option>
        </select>
      </div>
    </div>

    <div class="field-grid-3">
      <div class="field">
        <label>السعر الحالي</label>
        <input type="number" id="price" placeholder="21350">
      </div>
      <div class="field">
        <label>VWAP</label>
        <input type="number" id="vwap" placeholder="21300">
      </div>
      <div class="field">
        <label>ATR (اختياري)</label>
        <input type="number" id="atr" placeholder="25">
      </div>
    </div>

    <div class="field-grid">
      <div class="field">
        <label>أعلى أمس (PDH)</label>
        <input type="number" id="pdh" placeholder="21420">
      </div>
      <div class="field">
        <label>أدنى أمس (PDL)</label>
        <input type="number" id="pdl" placeholder="21200">
      </div>
      <div class="field">
        <label>دعم رئيسي (اختياري)</label>
        <input type="number" id="support" placeholder="21250">
      </div>
      <div class="field">
        <label>مقاومة رئيسية (اختياري)</label>
        <input type="number" id="resistance" placeholder="21400">
      </div>
    </div>

    <div class="divider"><span>السياق</span></div>

    <div class="field-grid">
      <div class="field">
        <label>الاتجاه على 1H</label>
        <select id="trend1h">
          <option value="صاعد">📈 صاعد</option>
          <option value="هابط">📉 هابط</option>
          <option value="range">↔️ Range</option>
        </select>
      </div>
      <div class="field">
        <label>موقع السعر من VWAP</label>
        <select id="vwapPos">
          <option value="فوق">فوق VWAP</option>
          <option value="تحت">تحت VWAP</option>
          <option value="عند">عند VWAP</option>
        </select>
      </div>
      <div class="field">
        <label>حالة الحساب اليوم</label>
        <select id="account">
          <option value="طبيعي">لم أتداول اليوم</option>
          <option value="ربحت صفقة">ربحت صفقة</option>
          <option value="خسرت صفقة">خسرت صفقة</option>
          <option value="قرب الهدف">قريب من هدف التحدي</option>
          <option value="قرب حد الخسارة">قريب من حد الخسارة</option>
        </select>
      </div>
      <div class="field">
        <label>الأخبار</label>
        <select id="news">
          <option value="لا يوجد">لا يوجد أخبار</option>
          <option value="أصفر">أخبار صفراء</option>
          <option value="أحمر قريب">خبر أحمر خلال 30 دقيقة</option>
          <option value="أحمر انتهى">خبر أحمر انتهى للتو</option>
          <option value="FOMC">FOMC اليوم</option>
          <option value="NFP">NFP اليوم</option>
        </select>
      </div>
    </div>

    <div class="field" style="margin-bottom:20px">
      <label>ملاحظة إضافية (اختياري)</label>
      <input type="text" id="extra" placeholder="مثال: Gap Up الصباح، اختراق مستوى مهم...">
    </div>

    <button class="analyze-btn" id="analyze-btn" onclick="analyze()">
      🤖 حلّل وأعطني الصفقة
    </button>
  </div>

  <div id="loading" class="loading hidden">
    <div class="pulse">🧠</div>
    <div class="loading-text">Claude يحلل السوق...</div>
    <div class="loading-sub">يحسب الدخول والستوب والهدف حسب قواعد Topstep</div>
  </div>

  <div id="error-box" class="error-box hidden"></div>
  <div id="result" class="hidden"></div>

  <div class="disclaimer">
    تحليل استشاري فقط • القرار النهائي لك • لا ضمان ربح
  </div>
</div>

<script>
const g = id => document.getElementById(id).value.trim();
const show = id => document.getElementById(id).classList.remove('hidden');
const hide = id => document.getElementById(id).classList.add('hidden');

async function analyze() {
  const price = g('price'), vwap = g('vwap'), pdh = g('pdh'), pdl = g('pdl');
  if (!price || !vwap || !pdh || !pdl) {
    showError('يرجى إدخال: السعر الحالي، VWAP، PDH، PDL على الأقل.');
    return;
  }

  hide('error-box');
  hide('result');
  show('loading');
  document.getElementById('analyze-btn').disabled = true;

  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        instrument: g('instrument'),
        session:    g('session'),
        price, vwap, pdh, pdl,
        support:    g('support'),
        resistance: g('resistance'),
        atr:        g('atr'),
        trend1h:    g('trend1h'),
        vwapPos:    g('vwapPos'),
        account:    g('account'),
        news:       g('news'),
        extra:      g('extra')
      })
    });

    const r = await res.json();
    if (r.error) { showError(r.error); return; }
    renderResult(r, g('instrument'));

  } catch(e) {
    showError('خطأ في الاتصال: ' + e.message);
  } finally {
    hide('loading');
    document.getElementById('analyze-btn').disabled = false;
  }
}

function renderResult(r, instrument) {
  const isTrade  = r.decision === 'Trade';
  const isLong   = r.direction === 'Long';
  const dirColor = isLong ? 'var(--accent)' : (r.direction === 'Short' ? 'var(--red)' : 'var(--muted)');
  const decColor = isTrade ? (isLong ? '#00C896' : '#FF4D6A') : '#FFB800';
  const gradeColor = r.grade === 'A+' ? '#00C896' : r.grade === 'B' ? '#FFB800' : '#FF4D6A';
  const confColor  = r.confidence >= 8 ? '#00C896' : r.confidence >= 6 ? '#FFB800' : '#FF4D6A';

  let html = `<div class="result-card">`;

  // Decision header
  html += `
    <div class="decision-header" style="background:${decColor}12;border-bottom:1px solid ${decColor}30">
      <div class="decision-label" style="color:${decColor}">القرار</div>
      <div class="decision-main" style="color:${decColor}">
        ${!isTrade ? '🚫 لا تداول' : (isLong ? '🟢 Long' : '🔴 Short')}
      </div>
      <div class="decision-reason">${r.mainReason}</div>
    </div>`;

  // Metrics
  html += `
    <div class="metrics-row">
      <div class="metric-item">
        <div class="metric-val" style="color:${gradeColor}">${r.grade}</div>
        <div class="metric-lbl">تقييم</div>
      </div>
      <div class="metric-item">
        <div class="metric-val" style="color:${confColor}">${r.confidence}/10</div>
        <div class="metric-lbl">الثقة</div>
      </div>
      <div class="metric-item">
        <div class="metric-val" style="color:var(--accent)">${r.rrRatio}</div>
        <div class="metric-lbl">R:R</div>
      </div>
      <div class="metric-item">
        <div class="metric-val" style="color:${dirColor}">${r.direction === 'N/A' ? '—' : r.direction}</div>
        <div class="metric-lbl">الاتجاه</div>
      </div>
    </div>`;

  // Trade details
  if (isTrade) {
    const tpColor = isLong ? 'var(--accent)' : 'var(--red)';
    const slColor = isLong ? 'var(--red)' : 'var(--accent)';
    html += `
      <div style="padding:20px 20px 0">
        <div style="font-size:12px;font-weight:800;color:var(--muted);margin-bottom:12px;letter-spacing:0.5px">تفاصيل الصفقة — ${instrument}</div>
      </div>
      <div class="trade-box">
        <div class="trade-box-header" style="color:${dirColor}">${isLong ? '🟢' : '🔴'} ${r.direction} — ${r.contracts} عقد Micro</div>
        <div class="trade-row">
          <span class="trade-row-label">🎯 سعر الدخول</span>
          <span class="trade-row-val" style="color:${dirColor}">${Number(r.entry).toLocaleString()}</span>
        </div>
        <div class="trade-row">
          <span class="trade-row-label">🛑 Stop Loss</span>
          <span class="trade-row-val" style="color:${slColor}">${Number(r.stopLoss).toLocaleString()} <span style="font-size:11px;font-weight:400;color:var(--muted)">(${r.stopPoints} نقطة = $${r.riskDollar})</span></span>
        </div>
        <div class="trade-row" style="background:#00C89606">
          <span class="trade-row-label">✅ Take Profit 1</span>
          <span class="trade-row-val" style="color:${tpColor}">${Number(r.tp1).toLocaleString()} <span style="font-size:11px;font-weight:400;color:var(--muted)">(${r.tp1Points} نقطة = +$${r.tp1Dollar})</span></span>
        </div>
        <div class="trade-row" style="background:#00C89603">
          <span class="trade-row-label">🏆 Take Profit 2</span>
          <span class="trade-row-val" style="color:${tpColor}">${Number(r.tp2).toLocaleString()} <span style="font-size:11px;font-weight:400;color:var(--muted)">(${r.tp2Points} نقطة = +$${r.tp2Dollar})</span></span>
        </div>
        <div class="trade-row" style="border-top:1px solid var(--border)">
          <span class="trade-row-label">💸 مخاطرة / عقد</span>
          <span class="trade-row-val" style="color:var(--red)">$${r.riskDollar}</span>
        </div>
        <div class="trade-row">
          <span class="trade-row-label">💰 هدف TP2 / عقد</span>
          <span class="trade-row-val" style="color:var(--accent)">+$${r.tp2Dollar}</span>
        </div>
      </div>`;

    html += `
      <div class="analysis-section">
        <div class="analysis-title">📐 منطق الصفقة</div>
        <div class="point">
          <div class="point-icon" style="background:#00C89622;color:var(--accent)">🎯</div>
          <div><strong style="color:var(--accent)">الدخول:</strong> ${r.entryLogic}</div>
        </div>
        <div class="point">
          <div class="point-icon" style="background:#FF4D6A22;color:var(--red)">🛑</div>
          <div><strong style="color:var(--red)">الستوب:</strong> ${r.stopLogic}</div>
        </div>
        <div class="point">
          <div class="point-icon" style="background:#00C89622;color:var(--accent)">🏆</div>
          <div><strong style="color:var(--accent)">الهدف:</strong> ${r.targetLogic}</div>
        </div>
      </div>`;
  }

  if (r.riskWarning) {
    html += `
      <div style="margin:0 20px 16px">
        <div style="background:#FF4D6A10;border:1.5px solid #FF4D6A40;border-radius:12px;padding:14px 16px">
          <div style="font-size:12px;font-weight:800;color:var(--red);margin-bottom:6px">🚨 تحذير</div>
          <div style="font-size:13px;line-height:1.6">${r.riskWarning}</div>
        </div>
      </div>`;
  }

  html += `
    <div class="psych-note">
      <div class="psych-note-title">🧠 ملاحظة نفسية</div>
      <div class="psych-note-text">${r.psychNote}</div>
    </div>
  </div>`;

  document.getElementById('result').innerHTML = html
    + `<button class="reset-btn" onclick="resetForm()">🔄 تحليل جديد</button>`;
  show('result');
  document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function showError(msg) {
  document.getElementById('error-box').innerHTML = '⚠️ ' + msg;
  show('error-box');
}
function resetForm() {
  hide('result');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
